apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: frontend
        image: 620830101228.dkr.ecr.us-east-1.amazonaws.com/cloudshop-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: API_URL
          value: "http://api:5000"