apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
        containers:
        - name: api
        image: 620830101228.dkr.ecr.us-east-1.amazonaws.com/cloudshop-api
        ports:
        - containerPort: 5000
        env:
          - name: REDIS_HOST
            value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000